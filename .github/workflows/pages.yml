name: Deploy static subfolder to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      site_dir:
        description: 'Subfolder to deploy'
        required: false
        default: 'learning/document-accessibility-course'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  # Use the provided input, or default to the subfolder
  SITE_DIR: ${{ inputs.site_dir || 'learning/document-accessibility-course' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Debug — environment & layout
        run: |
          set -euxo pipefail
          echo "BASH_VERSION=$BASH_VERSION"
          echo "SITE_DIR=$SITE_DIR"
          test -d "$SITE_DIR"
          sudo apt-get update -y
          sudo apt-get install -y tree
          tree -a -L 2 "$SITE_DIR"

      - name: Stage shared assets into SITE_DIR (optional)
        run: |
          set -euxo pipefail
          mkdir -p "$SITE_DIR/scripts" "$SITE_DIR/ajax"
          [ -d scripts ] && cp -a scripts/. "$SITE_DIR/scripts/" || true
          [ -d ajax ]    && cp -a ajax/.    "$SITE_DIR/ajax/"    || true

      - name: Rewrite URLs to be subfolder-local (use with care)
        run: |
          set -euxo pipefail
          mapfile -t files < <(find "$SITE_DIR" -type f \( -name '*.html' -o -name '*.js' -o -name '*.css' \))
          for f in "${files[@]}"; do
            sed -E -i.bak 's|\.\./\.\./scripts/|./scripts/|g' "$f"
            sed -E -i.bak 's|\.\./\.\./ajax/|./ajax/|g' "$f"
            sed -E -i.bak 's|"url":[[:space:]]*"\.\./\.\./ajax/|"url":"./ajax/|g' "$f"
            sed -E -i.bak 's|"menuPath":[[:space:]]*"\.\./\.\./ajax/|"menuPath":"./ajax/|g' "$f"
            sed -E -i.bak 's|href="\.\./\.\./index\.html"|href="./index.html"|g' "$f"
            rm -f "${f}.bak"
          done

      - name: Ensure index.html exists at SITE_DIR root
        run: |
          if [ ! -f "$SITE_DIR/index.html" ]; then
            echo "::error ::$SITE_DIR/index.html not found. Your deployed site needs a root index.html."
            exit 1
          fi

      - name: Add .nojekyll
        run: touch "$SITE_DIR/.nojekyll"

      - name: Remove large files (>100MB) before deploy
        run: |
          set -euxo pipefail
          find "$SITE_DIR" -type f -size +100M -print -delete

      # === Optional preflights (won't block deploy) ===
      - name: Use Node (if package.json at repo root)
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install deps (root)
        if: ${{ hashFiles('package.json') != '' }}
        run: npm ci --ignore-scripts || true

      - name: Run link-check script (root)
        if: ${{ hashFiles('package.json') != '' }}
        run: npm run link-check || true

      - name: Link check with lycheeverse/lychee-action
        uses: lycheeverse/lychee-action@v1
        with:
          args: --verbose --no-progress --max-concurrency 8 --timeout 20 --base . "$SITE_DIR/**/*.html"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Validate HTML (html-validate)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Run html-validate
        run: npx --yes html-validate "$SITE_DIR/**/*.html" || true

      # === Upload & deploy ===
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.SITE_DIR }}

      - id: deployment
        uses: actions/deploy-pages@v4
