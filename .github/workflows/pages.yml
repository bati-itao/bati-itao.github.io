name: Deploy static subfolder to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  SITE_DIR: learning/document-accessibility-course

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      # --- Debug: show env and tree so we know what we're deploying
      - name: Debug — environment & layout
        run: |
          set -euxo pipefail
          echo "BASH_VERSION=$BASH_VERSION"
          echo "SITE_DIR=$SITE_DIR"
          if [ ! -d "$SITE_DIR" ]; then
            echo "::error ::$SITE_DIR does not exist in this repo."
            exit 1
          fi
          sudo apt-get update -y
          sudo apt-get install -y tree
          tree -a -L 2

      # --- Stage assets the page expects (no-op if these don't exist at repo root)
      - name: Stage shared assets into SITE_DIR
        run: |
          set -euxo pipefail
          mkdir -p "$SITE_DIR/scripts" "$SITE_DIR/ajax"
          [ -d scripts ] && cp -a scripts/. "$SITE_DIR/scripts/" || true
          [ -d ajax ]    && cp -a ajax/.    "$SITE_DIR/ajax/"    || true

      # --- Rewrite ../../ -> ./  (use sed with .bak backups to avoid sed -i portability quirks)
      - name: Rewrite URLs to be subfolder-local
        run: |
          set -euxo pipefail
          mapfile -t files < <(find "$SITE_DIR" -type f \( -name '*.html' -o -name '*.js' -o -name '*.css' \))
          for f in "${files[@]}"; do
            # paths in attributes
            sed -E -i.bak 's|\.\./\.\./scripts/|./scripts/|g' "$f"
            sed -E -i.bak 's|\.\./\.\./ajax/|./ajax/|g' "$f"
            # JSON-ish occurrences inside attributes / inline JS
            sed -E -i.bak 's|"url":[[:space:]]*"\.\./\.\./ajax/|"url":"./ajax/|g' "$f"
            sed -E -i.bak 's|"menuPath":[[:space:]]*"\.\./\.\./ajax/|"menuPath":"./ajax/|g' "$f"
            # breadcrumb to local index
            sed -E -i.bak 's|href="\.\./\.\./index\.html"|href="./index.html"|g' "$f"
            rm -f "${f}.bak"
          done

  # --- Sanity check: upward-relative paths (disabled)
  # - name: Sanity check for escaping paths
  #   run: |
  #     set -euxo pipefail
  #     tmpout="$(mktemp)"
  #     # Collect any remaining upward-relative refs in href/src/url/menuPath
  #     grep -RInE 'href="(\.\./)+' "$SITE_DIR" >>"$tmpout" 2>/dev/null || true
  #     grep -RInE 'src="(\.\./)+'  "$SITE_DIR" >>"$tmpout" 2>/dev/null || true
  #     grep -RInE '"url":"(\.\./)+' "$SITE_DIR" >>"$tmpout" 2>/dev/null || true
  #     grep -RInE '"menuPath":"(\.\./)+' "$SITE_DIR" >>"$tmpout" 2>/dev/null || true
  #     if [ -s "$tmpout" ]; then
  #       echo "::error ::Found remaining upward-relative paths:"
  #       cat "$tmpout"
  #       # exit 1
  #     fi
  #     rm -f "$tmpout"

      # --- Ensure a landing page exists
      - name: Ensure index.html exists at SITE_DIR root
      - name: Add .nojekyll
        run: touch "learning/document-accessibility-course/.nojekyll"

      # === Size guard ===
      - name: Check site size (fail if > 250MB)
        run: |
          set -euxo pipefail
          if [ ! -f "$SITE_DIR/index.html" ]; then
            echo "::error ::$SITE_DIR/index.html not found. Your deployed site needs a root index.html."
            exit 1
          THRESHOLD=$((250*1024*1024))
          BYTES=$(du -sb "learning/document-accessibility-course" | cut -f1)
          echo "Build size: ${BYTES} bytes"
          if [ "$BYTES" -gt "$THRESHOLD" ]; then
            echo "::error ::Build too large for fast Pages deploy (>250MB)."
            # exit 1
          fi

      # --- Skip Jekyll
      - name: Add .nojekyll
        run: |
          set -euxo pipefail
          touch "$SITE_DIR/.nojekyll"

      # --- Optional: largest files
      - name: Show largest files (top 30)
        run: |
          set -euxo pipefail
          find "$SITE_DIR" -type f -printf "%s %p\n" | sort -nr | head -n 30 | awk '{printf "%10.0f KB  %s\n",$1/1024,$2}'
          echo "Largest files:"
          find "learning/document-accessibility-course" -type f -printf "%s %p\n" | sort -nr | head -n 30 | awk '{printf "%10.0f KB  %s\n",$1/1024,$2}'

      # --- Upload & deploy
      # === Preflight: your link-check script (if present) ===
      - name: Use Node (for link-check script)
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install deps (if any) for link-check
        if: ${{ hashFiles('package.json') != '' }}
        run: npm ci --ignore-scripts || true

      - name: Run link-check script
        if: ${{ hashFiles('package.json') != '' }}
        run: npm run link-check
        working-directory: learning/document-accessibility-course

      # === Preflight: deep link crawl (Lychee) ===
      - name: Link check with lycheeverse/lychee-action
        uses: lycheeverse/lychee-action@v1
        with:
          args: --verbose --no-progress --max-concurrency 8 --timeout 20 --base . "learning/document-accessibility-course/**/*.html"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # === Preflight: HTML validity ===
      - name: Validate HTML (html-validate)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Run html-validate
        run: npx --yes html-validate "learning/document-accessibility-course/**/*.html"

      # === Upload for Pages ===
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.SITE_DIR }}

      - id: deployment
        uses: actions/deploy-pages@v4
