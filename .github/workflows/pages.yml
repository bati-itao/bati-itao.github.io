name: Deploy to GitHub Pages (static subfolder)

on:
  push:
    branches: [ main ]   # change to your default branch if not 'main'
  workflow_dispatch:      # lets you run it manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  SITE_DIR: learning/document-accessibility-course

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add .nojekyll
        run: touch "$SITE_DIR/.nojekyll"

      - name: Check site size (fail if > 250MB)
        run: |
          THRESHOLD=$((250*1024*1024))
          BYTES=$(du -sb "$SITE_DIR" | cut -f1)
          echo "Build size: ${BYTES} bytes"
          if [ "$BYTES" -gt "$THRESHOLD" ]; then
            echo "::error ::Build too large for fast Pages deploy (>250MB)."
            exit 1
          fi

      - name: Show largest files (top 30)
        run: |
          echo "Largest files in $SITE_DIR:"
          find "$SITE_DIR" -type f -printf "%s %p\n" | sort -nr | head -n 30 | awk '{printf "%10.0f KB  %s\n",$1/1024,$2}'

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.SITE_DIR }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
