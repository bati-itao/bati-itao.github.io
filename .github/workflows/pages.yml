name: Deploy static subfolder to GitHub Pages

on:
  push:
    branches: [ main ]   # change if your default branch differs
  workflow_dispatch:      # allow manual runs from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  SITE_DIR: learning/document-accessibility-course

jobs:
  deploy:
    # Optional: uncomment & change to keep this workflow running ONLY on your fork
    # if: github.repository == 'YOUR_GITHUB_USERNAME/YOUR_REPO'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1) Make the subfolder self-contained by staging shared assets into it
      - name: Stage shared assets into SITE_DIR
        run: |
          mkdir -p "$SITE_DIR/scripts" "$SITE_DIR/ajax"
          if [ -d scripts ]; then cp -a scripts/. "$SITE_DIR/scripts/"; fi
          if [ -d ajax ];    then cp -a ajax/.    "$SITE_DIR/ajax/";    fi

      # 2) Rewrite upward-relative URLs inside the subfolder to local paths
      - name: Rewrite URLs to be subfolder-local
        run: |
          shopt -s nullglob
          mapfile -t files < <(find "$SITE_DIR" -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" \))
          for f in "${files[@]}"; do
            # ../../scripts/...  and ../../ajax/...  ->  ./scripts/...  &  ./ajax/...
            sed -i 's|\.\./\.\./scripts/|./scripts/|g' "$f"
            sed -i 's|\.\./\.\./ajax/|./ajax/|g' "$f"

            # Common JSON-in-HTML attributes (data-wb-ajax, menuPath)
            sed -i 's|"url":[[:space:]]*"\.\./\.\./ajax/|"url":"./ajax/|g' "$f"
            sed -i 's|"menuPath":[[:space:]]*"\.\./\.\./ajax/|"menuPath":"./ajax/|g' "$f"

            # Breadcrumb "Home" pointing to repo root -> local index
            sed -i 's|href="\.\./\.\./index\.html"|href="./index.html"|g' "$f"
          done

      # 3) Sanity check: no escaping paths should remain (href/src/url/menuPath)
      - name: Sanity check for escaping paths
        run: |
          set -e
          if grep -RInE 'href="\.\./|src="\.\./|url":"\.\./|menuPath":"\.\./' "$SITE_DIR"; then
